<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Erreur Serveur | Novair</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #141414;
            color: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Background gradient */
        .bg-gradient {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(76, 175, 80, 0.1) 0%, #141414 70%);
            z-index: 0;
        }

        /* Particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(76, 175, 80, 0.3);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; top: 60%; animation-delay: 1s; }
        .particle:nth-child(3) { left: 80%; top: 30%; animation-delay: 2s; }
        .particle:nth-child(4) { left: 70%; top: 70%; animation-delay: 3s; }
        .particle:nth-child(5) { left: 40%; top: 10%; animation-delay: 1.5s; }
        .particle:nth-child(6) { left: 90%; top: 80%; animation-delay: 2.5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
            50% { transform: translateY(-30px) scale(1.5); opacity: 0.8; }
        }

        /* Container */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Error code */
        .error-code {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            animation: slideDown 0.8s ease-out 0.2s both;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-number {
            font-size: 6rem;
            font-weight: 700;
            color: rgba(76, 175, 80, 0.3);
            text-shadow: 0 0 30px rgba(76, 175, 80, 0.3);
            line-height: 1;
        }

        .error-icon {
            width: 80px;
            height: 80px;
            background: rgba(76, 175, 80, 0.1);
            border: 2px solid rgba(76, 175, 80, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .error-icon svg {
            width: 40px;
            height: 40px;
            stroke: #4caf50;
            animation: shake 4s ease-in-out infinite;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
        }

        /* Title */
        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #fafafa;
            animation: slideDown 0.8s ease-out 0.3s both;
        }

        /* Description */
        p {
            font-size: 1.125rem;
            color: #a3a3a3;
            line-height: 1.7;
            margin-bottom: 2rem;
            animation: slideDown 0.8s ease-out 0.4s both;
        }

        /* Buttons */
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            animation: slideDown 0.8s ease-out 0.5s both;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 1.75rem;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background: #4caf50;
            color: #141414;
        }

        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: #fafafa;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* Info box */
        .info-box {
            margin-top: 3rem;
            padding: 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            animation: slideDown 0.8s ease-out 0.6s both;
        }

        .info-box p {
            font-size: 0.875rem;
            margin: 0;
            color: #737373;
        }

        .info-box strong {
            color: #4caf50;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .error-number {
                font-size: 4rem;
            }

            .error-icon {
                width: 60px;
                height: 60px;
            }

            .error-icon svg {
                width: 30px;
                height: 30px;
            }

            h1 {
                font-size: 2rem;
            }

            p {
                font-size: 1rem;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* Loading animation */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fafafa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="bg-gradient"></div>

    <!-- Particles -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <!-- Main content -->
    <div class="container">
        <!-- Error code with icon -->
        <div class="error-code">
            <span class="error-number">5</span>
            <div class="error-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                    <line x1="12" y1="18" x2="12.01" y2="18"></line>
                </svg>
            </div>
            <span class="error-number">0</span>
        </div>

        <!-- Title -->
        <h1>Erreur Serveur</h1>

        <!-- Description -->
        <p>
            Désolé, quelque chose s'est mal passé sur nos</p> serveurs.
            Nous travaillons activement à résoudre ce problème.
            Veuillez réessayer dans quelques instants.
        </p>

        <!-- Actions -->
        <div class="actions">
            <a href="/" class="btn btn-primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                Retour à l'accueil
            </a>
            <button class="btn btn-secondary" onclick="location.reload()">
                <span class="loading"></span>
                Réessayer
            </button>
        </div>

        <!-- Info box -->
        <div class="info-box">
            <p>
                <strong>Code erreur:</strong> 500 - Internal Server Error<br>
                Si le problème persiste, contactez-nous à <strong>contact@novair.fr</strong>
            </p>
        </div>
    </div>

    <script>
        // Auto retry after 10 seconds
        let countdown = 10;
        const retryBtn = document.querySelector('.btn-secondary');
        const originalText = retryBtn.innerHTML;

        const interval = setInterval(() => {
            countdown--;
            if (countdown > 0) {
                retryBtn.innerHTML = `<span class="loading"></span> Réessayer (${countdown}s)`;
            } else {
                clearInterval(interval);
                location.reload();
            }
        }, 1000);

        // Cancel auto-retry on user interaction
        retryBtn.addEventListener('click', () => {
            clearInterval(interval);
            retryBtn.innerHTML = '<span class="loading"></span> Chargement...';
        });
    </script>
</body>
</html>
